<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covoit - Tableau de bord</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .tab-header { display: flex; gap: 32px; border-bottom: 2px solid var(--border-light); margin-bottom: 32px; }
    .tab-btn { font-size: 16px; font-weight: 700; color: var(--text-faint); padding: 12px 0; border-bottom: 3px solid transparent; transition: all var(--transition); }
    .tab-btn:hover { color: var(--text-main); }
    .tab-btn.active { color: var(--text-main); border-bottom-color: var(--primary); }

    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .stat-card { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow-sm); }
    .stat-val { font-size: 36px; font-weight: 800; color: var(--primary); }
    .stat-lbl { font-size: 14px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    
    .list-item { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 24px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .list-item .date-box { background: var(--bg-app); border-radius: var(--radius-md); padding: 12px 16px; text-align: center; border: 1px solid var(--border-light); min-width: 80px; }
    .empty-state { text-align: center; padding: 64px 24px; border: 2px dashed var(--border-light); border-radius: var(--radius-lg); }
  </style>
</head>
<body>

  <!-- THE FLAWLESS NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M12 2L2 22h20L12 2zm0 4.83l6.5 13.17H5.5L12 6.83z"/></svg> Covoit
    </a>
    <div class="nav-links">
      <a href="search.html" class="nav-link">Rechercher</a>
      <a href="publish.html" class="nav-link">Proposer un trajet</a>
      <a href="dashboard.html" class="nav-link active" id="nav-books" style="display:none;">Mes réservations</a>
    </div>
    <div class="nav-actions" id="n-auth" style="display:none;">
      <a href="auth.html" class="btn btn-secondary" style="border:none; box-shadow:none; font-weight:700;">Se connecter</a>
      <a href="auth.html" class="btn btn-primary">Inscription</a>
    </div>
    <div class="nav-actions" id="n-user" style="display:none;">
      <a href="inbox.html" class="btn-ghost" style="padding:8px; border-radius:50%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></a>
      <a href="wallet.html" class="badge badge-success" style="font-size:14px; padding:6px 16px;" id="u-bal">...</a>
      <a href="dashboard.html"><img src="" class="avatar" style="border-color:var(--primary);" id="u-avatar"></a>
    </div>
  </nav>

  <main class="container" style="padding-top: 48px; padding-bottom: 96px;">
    
    <div class="flex justify-between items-center" style="margin-bottom: 48px;">
        <div class="flex items-center gap-6">
            <img src="" id="d-avatar" style="width:80px; height:80px; border-radius:50%; box-shadow:var(--shadow-md);">
            <div class="flex-col">
                <h1 style="font-size:32px; font-weight:800; color:var(--text-main);" id="d-name">...</h1>
                <span class="badge badge-primary" style="width:fit-content; margin-top:8px;">Membre Vérifié</span>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="window.API.logout()">Déconnexion</button>
    </div>

    <!-- IMPACT CARDS -->
    <div class="dash-stats" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin:32px 0;">
        <div class="card" style="padding:20px; text-align:center; background:var(--bg-surface); border:1px solid var(--border-light); border-radius:var(--radius-lg);">
            <span style="font-size:32px; font-weight:800; color:var(--success);" id="st-co2">0.0</span>
            <div style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">CO2 Économisé (KG)</div>
        </div>
        <div class="card" style="padding:20px; text-align:center; background:var(--bg-surface); border:1px solid var(--border-light); border-radius:var(--radius-lg);">
            <span style="font-size:32px; font-weight:800; color:var(--primary);" id="st-trees">0.0</span>
            <div style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Arbres "Plantés"</div>
        </div>
        <div class="card" style="padding:20px; text-align:center; background:var(--bg-surface); border:1px solid var(--border-light); border-radius:var(--radius-lg);">
            <span style="font-size:32px; font-weight:800; color:var(--text-main);" id="st-trips">0</span>
            <div style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase;">Trajets Communs</div>
        </div>
    </div>

    <!-- Stats -->
    <div class="dash-grid" style="margin-bottom:64px;">
        <div class="stat-card">
            <div class="flex-col">
                <span class="stat-lbl">Réservations effectuées</span>
                <span class="stat-val" id="st-books">0</span>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" width="48" height="48" style="opacity:0.2;"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <div class="stat-card">
            <div class="flex-col">
                <span class="stat-lbl">Trajets publiés</span>
                <span class="stat-val" id="st-pubs">0</span>
            </div>
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" width="48" height="48" style="opacity:0.2;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tab-header" id="dash-tabs">
        <button class="tab-btn active" id="tab-btn-1" onclick="switchTab(1)">Réservations Effectuées</button>
        <button class="tab-btn" id="tab-btn-2" onclick="switchTab(2)">Mes Trajets Publiés</button>
        <button class="tab-btn" id="tab-btn-3" onclick="switchTab(3)" style="display:none;">Demandes Reçues</button>
    </div>

    <div id="tab-1" class="tab-content">
        <!-- JS injects here -->
    </div>

    <div id="tab-2" class="tab-content" style="display:none;">
        <!-- JS injects here -->
    </div>

    <div id="tab-3" class="tab-content" style="display:none;">
        <!-- JS injects here -->
    </div>

  </main>

  <script src="js/app.js"></script>
  <script>
    const u = window.API.getCurrentUser();

    function switchTab(n) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`tab-btn-${n}`).classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.getElementById(`tab-${n}`).style.display = 'block';
    }

    async function handleBooking(id, action) {
        if(action === 'accept') await window.API.acceptBooking(id);
        else await window.API.refuseBooking(id);
        Toast.show("Opération réussie", "success");
        renderDashboard();
    }

    async function handleTripAction(id, action) {
        if(action === 'cancel') {
            if(!confirm("Êtes-vous sûr de vouloir annuler ce trajet ? Tous les passagers seront remboursés.")) return;
            await window.API.cancelTrip(id);
            Toast.show("Trajet annulé et passagers remboursés", "success");
        } else {
            await window.API.completeTrip(id);
            Toast.show("Trajet marqué comme terminé", "success");
        }
        renderDashboard();
    }

    function renderDashboard() {
        if(!u) return;
        const trips = DB.get('cov_trips') || [];
        const bookings = DB.get('cov_bookings') || [];

        // Stats injection
        const stats = window.API.getStats();
        document.getElementById('st-co2').innerText = stats.co2Saved.toFixed(1);
        document.getElementById('st-trees').innerText = stats.trees.toFixed(1);
        document.getElementById('st-trips').innerText = stats.totalTrips;

        // Tab 1: My Bookings
        const myBooks = bookings.filter(b => b.userId === u.id);
        document.getElementById('st-books').innerText = myBooks.length;
        
        let bookHtml = '';
        if(myBooks.length === 0) {
            bookHtml = `<div class="empty-state"><p class="text-muted" style="margin-bottom:24px;">Aucune réservation trouvée.</p><button class="btn btn-primary" onclick="window.location.href='search.html'">Explorer les trajets</button></div>`;
        } else {
            bookHtml = myBooks.map(bk => {
                const tr = trips.find(t => t.id === bk.tripId) || { dep: '?', arr: '?', depTime: '?', price: 0 };
                const d = new Date(bk.date);
                return `
                <div class="list-item">
                    <div class="flex items-center gap-6">
                        <div class="date-box">
                            <div style="font-size:12px; font-weight:700; color:var(--text-faint);">${d.toLocaleString('fr',{month:'short'})}</div>
                            <div style="font-size:24px; font-weight:800;">${d.getDate()}</div>
                        </div>
                        <div class="flex-col">
                            <div style="font-size:18px; font-weight:700;">${tr.dep}➔${tr.arr}</div>
                            <div style="font-size:14px; font-weight:600; color:var(--text-muted);">${tr.depTime} — ${bk.qty} place(s)</div>
                        </div>
                    </div>
                    <div class="flex-col" style="text-align:right; gap:8px;">
                        <span class="badge ${(bk.status==='ACCEPTED'||bk.status==='COMPLETED') ? 'badge-success' : ((bk.status==='REFUSED'||bk.status==='REJECTED'||bk.status==='CANCELLED') ? 'badge-error' : 'badge-primary')}">
                            ${bk.status === 'PENDING' ? 'En attente d\'approbation' : (bk.status === 'ACCEPTED' ? 'Confirmé' : (bk.status === 'COMPLETED' ? 'Terminé' : (bk.status === 'REFUSED' || bk.status === 'REJECTED' ? 'Refusé' : 'Annulé')))}
                        </span>
                        <div style="font-weight:800; font-size:16px;">${Number(bk.totalCost || 0).toFixed(2)} TND</div>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('tab-1').innerHTML = bookHtml;

        // Drivers & Car Owners Visibility
        const userCars = (DB.get('cov_cars') || []).filter(c => c.userId === u.id);
        const canPublish = u.role === 'DRIVER' || userCars.length > 0;
        if(!canPublish) {
            document.getElementById('tab-btn-2').style.display = 'none';
            const statCardPubs = document.getElementById('st-pubs').closest('.stat-card');
            if(statCardPubs) statCardPubs.style.display = 'none';
        }

        // Tab 2: My Published Trips
        const myTrips = trips.filter(t => Number(t.driverId) === Number(u.id));
        document.getElementById('st-pubs').innerText = myTrips.length;
        
        let pubHtml = '';
        if(myTrips.length === 0) {
            pubHtml = `<div class="empty-state"><p class="text-muted" style="margin-bottom:24px;">Aucun trajet publié.</p><button class="btn btn-primary" onclick="window.location.href='publish.html'">Créer mon premier trajet</button></div>`;
        } else {
            pubHtml = myTrips.map(tr => {
                const d = new Date(tr.publishDate);
                return `
                <div class="list-item">
                   <div class="flex items-center gap-6">
                      <div class="date-box" style="background:var(--bg-app); border:1px solid var(--border-light);">
                          <div style="font-size:12px; font-weight:700; color:var(--text-faint);">${d.toLocaleString('fr',{month:'short'})}</div>
                          <div style="font-size:24px; font-weight:800; color:var(--text-main);">${d.getDate()}</div>
                      </div>
                      <div class="flex-col">
                          <div style="font-weight:700; font-size:17px; color:var(--text-main);">${tr.dep}➔${tr.arr}</div>
                          <div style="font-size:13px; color:var(--text-muted); font-weight:500;">${tr.depTime} — ${tr.seats} places vides</div>
                      </div>
                   </div>
                   <div class="flex-col" style="text-align:right; gap:8px;">
                       <span style="font-weight:800; font-size:18px; color:var(--text-main);">${Number(tr.price || 0).toFixed(2)} TND</span>
                       <div class="flex gap-2">
                           <button class="btn btn-ghost" onclick="handleTripAction(${tr.id}, 'complete')" title="Marquer comme terminé" style="padding:4px; border-radius:50%; color:var(--success);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><polyline points="20 6 9 17 4 12"></polyline></svg></button>
                           <button class="btn btn-ghost" onclick="handleTripAction(${tr.id}, 'cancel')" title="Annuler le trajet" style="padding:4px; border-radius:50%; color:var(--error);"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                       </div>
                   </div>
                </div>`;
            }).join('');
        }
        document.getElementById('tab-2').innerHTML = pubHtml;

        // Tab 3: Incoming Requests (DRIVER ONLY Visibility)
        const reqs = window.API.getDriverRequests();
        if(canPublish && (reqs.length > 0 || myTrips.length > 0)) document.getElementById('tab-btn-3').style.display = 'block';
        else document.getElementById('tab-btn-3').style.display = 'none';

        let reqHtml = '';
        if(reqs.length === 0) {
            reqHtml = `<div class="empty-state" style="padding:80px 24px;"><span style="font-size:48px;">📨</span><h2 style="margin-top:16px;">Aucune demande</h2><p style="color:var(--text-muted);">Dès qu'un voyageur réserve, sa demande apparaîtra ici.</p></div>`;
        } else {
            reqHtml = reqs.map(r => {
                const p = (DB.get('cov_users') || []).find(x => Number(x.id) === Number(r.userId)) || { name: 'Anonyme', id: 0 };
                const t = trips.find(x => Number(x.id) === Number(r.tripId)) || { dep: '?', arr: '?' };
                const rating = window.API.getUserRating(r.userId);
                return `
                <div class="list-item" style="padding:24px;">
                    <div class="flex-col gap-4" style="width:100%;">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <img src="https://ui-avatars.com/api/?name=${p.name.replace(' ','+')}&background=random" class="avatar" style="width:48px; height:48px;">
                                <div class="flex-col">
                                    <div class="flex items-center gap-2">
                                        <b style="font-size:16px; color:var(--text-main);">${p.name}</b>
                                        <div class="flex items-center" style="color:var(--warning); font-size:12px; font-weight:700;">
                                            <svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12" style="margin-right:2px;"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                                            ${rating.toFixed(1)}
                                        </div>
                                    </div>
                                    <span style="font-size:13px; color:var(--text-muted); font-weight:500;">${r.qty} place(s) réservée(s) pour <b style="color:var(--primary);">${t.dep}➔${t.arr}</b></span>
                                </div>
                            </div>
                            <div class="flex gap-2">
                                ${r.status === 'PENDING' ? `
                                    <button class="btn btn-ghost" onclick="window.location.href='inbox.html?with=${p.id}'" style="padding:8px; border-radius:50%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></button>
                                    <button class="btn btn-primary" style="height:40px; padding:0 20px; font-size:13px; border-radius:10px;" onclick="handleBooking(${r.id}, 'accept')">Accepter</button>
                                    <button class="btn btn-secondary" style="height:40px; padding:0 20px; font-size:13px; border-radius:10px;" onclick="handleBooking(${r.id}, 'refuse')">Refuser</button>
                                ` : `
                                    <button class="btn btn-ghost" onclick="window.location.href='inbox.html?with=${p.id}'" style="padding:8px; border-radius:50%;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg></button>
                                    <span class="badge ${r.status === 'ACCEPTED' ? 'badge-success' : 'badge-error'}">${r.status === 'ACCEPTED' ? 'Accepté' : 'Refusé'}</span>
                                `}
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
        document.getElementById('tab-3').innerHTML = reqHtml;
    }

    document.addEventListener("DOMContentLoaded", () => {
        if(!u) return window.location.href = 'auth.html';
        
        document.getElementById('d-name').innerText = u.name;
        document.getElementById('d-avatar').src = `https://ui-avatars.com/api/?name=${u.name.replace(' ','+')}&background=2563EB&color=fff&size=128`;
        
        renderDashboard();

        // DEEP LINKING SUPPORT
        const urlParams = new URLSearchParams(window.location.search);
        const tab = urlParams.get('tab');
        if(tab) switchTab(parseInt(tab));
    });
  </script>
</body>
</html>
