<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Covoit - Notifications</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .note-item { background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-lg); padding: 24px; display: flex; align-items: flex-start; gap: 20px; transition: all var(--transition); margin-bottom: 16px; position: relative; }
    .note-item:hover { border-color: var(--primary); transform: translateX(8px); }
    .note-item.unread { border-left: 4px solid var(--primary); background: #F8FAFC; }
    
    .note-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--primary-glow); color: var(--primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .note-content { flex: 1; }
    .note-content h3 { font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; }
    .note-content p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
    .note-time { font-size: 12px; font-weight: 600; color: var(--text-faint); margin-top: 8px; display: block; }
    
    .empty-state { text-align: center; padding: 120px 24px; border: 2px dashed var(--border-light); border-radius: var(--radius-lg); }
  </style>
</head>
<body>

  <!-- THE FLAWLESS NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="brand">
      <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28"><path d="M12 2L2 22h20L12 2zm0 4.83l6.5 13.17H5.5L12 6.83z"/></svg> Covoit
    </a>
    <div class="nav-links">
      <a href="search.html" class="nav-link">Rechercher</a>
      <a href="publish.html" class="nav-link">Proposer un trajet</a>
      <a href="dashboard.html" class="nav-link" id="nav-books" style="display:none;">Mes réservations</a>
    </div>
    <div class="nav-actions" id="n-auth" style="display:none;">
      <a href="auth.html" class="btn btn-secondary" style="border:none; box-shadow:none; font-weight:700;">Se connecter</a>
      <a href="auth.html" class="btn btn-primary">Inscription</a>
    </div>
    <div class="nav-actions" id="n-user" style="display:none;">
      <!-- Injected by app.js: Wallet and Avatar -->
    </div>
  </nav>

  <main class="container" style="padding-top: 64px; max-width: 800px;">
    <div class="flex justify-between items-center" style="margin-bottom: 32px;">
        <h1 style="font-size:32px; font-weight:800; letter-spacing:-0.02em;">Notifications</h1>
        <button class="btn btn-secondary" onclick="markAllRead()" style="height:40px; padding:0 16px; font-size:13px;">Tout marquer comme lu</button>
    </div>

    <div id="notifications-list">
        <!-- Dyn -->
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    const u = window.API.getCurrentUser();
    
    function renderNotifications() {
        const notes = (DB.get('cov_notifications') || []).filter(n => n.userId === u.id).sort((a,b) => new Date(b.date) - new Date(a.date));
        const container = document.getElementById('notifications-list');
        
        if(notes.length === 0) {
            container.innerHTML = `<div class="empty-state"><span style="font-size:48px;">🔔</span><h2>Aucune notification</h2><p style="color:var(--text-muted);">Vous êtes à jour !</p></div>`;
            return;
        }

        container.innerHTML = notes.map(n => {
            const time = new Date(n.date).toLocaleString('fr-FR', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'short'});
            return `
            <div class="note-item ${n.read ? '' : 'unread'}">
                <div class="note-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </div>
                <div class="note-content">
                    <h3>${n.title}</h3>
                    <p>${n.message}</p>
                    <span class="note-time">${time}</span>
                </div>
            </div>`;
        }).join('');
    }

    function markAllRead() {
        let notes = DB.get('cov_notifications') || [];
        notes.forEach(n => { if(n.userId === u.id) n.read = true; });
        DB.set('cov_notifications', notes);
        renderNotifications();
    }

    document.addEventListener("DOMContentLoaded", () => {
        if(!u) return window.location.href = 'auth.html';
        renderNotifications();
    });
  </script>
</body>
</html>
